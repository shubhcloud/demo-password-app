name: ArgoCD Applications Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "argocd/**"
      - ".github/workflows/argo-apps-deploy.yaml"

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: passwordapp-rg
  AKS_CLUSTER_NAME: passwordapp-aks

jobs:
  deploy-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Azure OIDC Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARGO_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      # Install kubelogin (AAD clusters)
      - name: Setup kubelogin
        uses: azure/use-kubelogin@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          kubelogin-version: "latest"

      # Get AKS context
      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      # Apply ArgoCD Applications only
      - name: Deploy ArgoCD Applications
        run: |
          kubectl apply -f argocd/applications/envoy-proxy.yaml
          kubectl apply -f argocd/applications/grafana.yaml
          kubectl apply -f argocd/applications/password-app.yaml
          kubectl apply -f argocd/applications/prometheus.yaml

      # Apply Menifest only
      - name: Deploy ArgoCD Applications
        run: |
          kubectl apply -f argocd/menifests/argo-httproute.yaml
          kubectl apply -f argocd/menifests/gateway.yaml
          kubectl apply -f argocd/menifests/gatewayclass.yaml
          kubectl apply -f argocd/menifests/grafana-httproutes.yaml
          kubectl apply -f argocd/menifests/networkpolicy.yaml
          kubectl apply -f argocd/menifests/passwordapp-httproute.yaml
          kubectl apply -f argocd/menifests/prometheus-httproutes.yaml
          kubectl apply -f argocd/menifests/role-rolebinding.yaml