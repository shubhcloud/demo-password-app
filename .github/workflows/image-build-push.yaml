name: Build & Push Docker Image to ACR

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docker/Dockerfile"
      - ".github/workflows/image-build-push.yaml"

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  ACR_NAME: passwordapp
  IMAGE_NAME: passwordapp

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      # Azure OIDC login (federated)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ACR_CLIENT_ID }}
          tenant-id: ${{ secrets.ACR_TENANT_ID }}
          subscription-id: ${{ secrets.ACR_SUBSCRIPTION_ID }}

      # Login Docker to ACR using Azure identity
      - name: ACR Login
        run: az acr login --name $ACR_NAME

      # Short SHA tag (5 chars)
      - name: Set image tag
        id: image
        run: echo "TAG=${GITHUB_SHA::5}" >> $GITHUB_ENV

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: docker/Dockerfile
          push: false
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.TAG }}
     
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.34.0
        with:
          image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.TAG }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

       # Upload SARIF to GitHub Security
      - name: Upload Trivy SARIF
        if: ${{ always() }}   # upload even if scan failed
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      # Push only if scan passed
      - name: Push image
        if: ${{ success() }}
        uses: docker/build-push-action@v6
        with:
          context: app
          file: docker/Dockerfile
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.TAG }}