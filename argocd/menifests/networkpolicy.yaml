apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: passwordapp-allow-lb-only
  namespace: passwordapp
spec:
  podSelector:
    matchLabels:
      app: passwordapp

  policyTypes:
  - Ingress

  ingress:
  - from:
    - namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: envoy-gateway-system
    podSelector:
      matchLabels:
        app.kubernetes.io/name: gateway-helm